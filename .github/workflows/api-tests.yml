name: API Tests

on:
  push:
    branches: [main]
    paths:
      - 'api-automation-postman/BookerCollection.json'
      - 'api-automation-postman/BookerEnvironment.json'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2              # ← updated

      - name: Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run API Tests
        run: |
          mkdir -p reports
          newman run api-automation-postman/BookerCollection.json \
            -e api-automation-postman/BookerEnvironment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/report.html

      - name: Upload Report
        uses: actions/upload-artifact@v4.6.2        # ← updated
        with:
          name: api-test-report
          path: reports/report.html
